services:
  - type: web
    name: badili-api
    rootDir: backend
    env: node
    buildCommand: apt-get update && apt-get install -y chromium-browser && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: NODE_ENV
        value: production
